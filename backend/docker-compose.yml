version: "3.9"

services:
  postgres:
    image: postgis/postgis:17-3.4-alpine
    container_name: turfx_postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: turfx
      POSTGRES_USER: turfx
      POSTGRES_PASSWORD: turfx_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turfx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: turfx_redis
    ports: ["6379:6379"]

volumes:
  pgdata:
