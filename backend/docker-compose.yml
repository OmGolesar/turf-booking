version: "3.9"

services:
  postgres:
    image: postgis/postgis:17-3.4-alpine
    container_name: turfx_postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: turfx
      POSTGRES_USER: turfx
      POSTGRES_PASSWORD: turfx_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turfx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: turfx_redis
    ports: ["6379:6379"]

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["3000:3000"]
    env_file: .env
    command: node dist/main.js

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    command: node dist/worker.main.js

volumes:
  pgdata:
