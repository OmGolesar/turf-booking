name: turfx
description: "TurfX — Premium Turf Booking Application. Book your turf, play your game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

# ─────────────────────────────────────────────────────────────
# Runtime Dependencies
# ─────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # ── Navigation ────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Networking ────────────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Local Storage ─────────────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # ── UI / Design ───────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  gap: ^3.0.1

  # ── Media ─────────────────────────────────────────────────
  image_picker: ^1.0.7

  # ── Utils ─────────────────────────────────────────────────
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.3.0
  uuid: ^4.3.3
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1

# ─────────────────────────────────────────────────────────────
# Dev Dependencies
# ─────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.3
  fake_async: ^1.3.1

# ─────────────────────────────────────────────────────────────
# Flutter Configuration
# ─────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/placeholders/
    - assets/icons/
    - assets/icons/sports/
    - assets/animations/
